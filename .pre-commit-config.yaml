repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff-check
        args: [--fix]

      - id: ruff-format

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.4.0
    hooks:
      - id: sqlfluff-lint
        additional_dependencies:
          - dbt-duckdb
          - sqlfluff-templater-dbt

      - id: sqlfluff-fix
        additional_dependencies:
          - dbt-duckdb
          - sqlfluff-templater-dbt